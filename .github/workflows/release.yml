# Release pipeline for GLI.
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.0.2`). Builds a
# macOS DMG, signs the update artifact with the Tauri updater key,
# and publishes everything to a GitHub Release. The published release
# also contains a `latest.json` — the file the installed app polls
# at `https://github.com/Raeedzz/RLI/releases/latest/download/latest.json`
# to discover new versions.
#
# ──────────────────────────── one-time setup ────────────────────────────
#
# 1. Generate the updater keypair on your dev machine:
#
#      mkdir -p ~/.tauri
#      bun tauri signer generate -w ~/.tauri/gli.key
#
#    You'll be prompted for a password — pick something memorable. The
#    command prints a base64 public key when it finishes.
#
# 2. Paste the public key into `src-tauri/tauri.conf.json`:
#
#      "plugins": {
#        "updater": {
#          "endpoints": [...],
#          "pubkey": "<paste here>"
#        }
#      }
#
#    Commit + push that change.
#
# 3. Add two GitHub secrets at
#    https://github.com/Raeedzz/RLI/settings/secrets/actions :
#
#      TAURI_SIGNING_PRIVATE_KEY          ← contents of ~/.tauri/gli.key
#      TAURI_SIGNING_PRIVATE_KEY_PASSWORD ← password you set in step 1
#
# 4. (Optional — Apple notarization) If you want users to skip the
#    Gatekeeper warning on first install, add the Apple secrets too:
#
#      APPLE_CERTIFICATE             ← base64 of your .p12 Developer ID cert
#      APPLE_CERTIFICATE_PASSWORD    ← .p12 password
#      APPLE_SIGNING_IDENTITY        ← e.g. "Developer ID Application: Name (TEAMID)"
#      APPLE_ID                      ← Apple account email
#      APPLE_PASSWORD                ← app-specific password
#      APPLE_TEAM_ID                 ← 10-char team id
#
#    Without these the build still runs and updates still install
#    (Tauri's ed25519 signature covers integrity), users just see
#    Gatekeeper on the very first install.
#
# 5. Ship a release:
#
#      # bump the version in package.json + tauri.conf.json + Cargo.toml
#      git commit -am "release v0.0.2"
#      git tag v0.0.2
#      git push origin main --tags
#
#    GitHub Actions will pick up the tag, build, and publish a draft
#    release containing the DMG + `latest.json`. Promote the draft to
#    "Latest release" and installed apps will pick it up within four
#    hours (or sooner if the user relaunches).

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & publish (macOS)
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Download `rg` sidecar binaries
        # The bundler refuses to package an externalBin path that
        # doesn't exist; this script fetches the macOS binaries our
        # bundle declares in `tauri.conf.json`.
        run: bun run download-rg

      - name: Build & sign DMG, publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required for the updater plugin to
          # accept the build. The pubkey baked into the app must match
          # the private key here.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing + notarization — optional; tauri-action
          # skips the steps when these are blank.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Build universal so a single DMG runs on Apple Silicon + Intel.
          args: --target universal-apple-darwin
          # The release notes pulled from the tag message. tauri-action
          # creates a draft release with these fields populated.
          tagName: ${{ github.ref_name }}
          releaseName: "GLI ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Generate + upload `latest.json` so the installed app's
          # configured endpoint resolves to a real artifact.
          updaterJsonPreferNsis: false
          includeUpdaterJson: true
